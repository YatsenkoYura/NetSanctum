<!-- Auth error fragment — returned by HTMX on authentication failure -->
<div class="border border-red-500 bg-red-950/20 p-4 rounded-none">
    <div class="flex items-center gap-3">
        <span class="text-red-500 text-base">&#10006;</span>
        <div>
            <p class="text-xs font-mono font-bold text-red-500 uppercase">Access Denied</p>
            <p class="text-[11px] font-mono text-zinc-400 mt-0.5">{{ error }}</p>
        </div>
    </div>
</div>
