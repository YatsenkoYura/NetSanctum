{% extends "base.html" %}

{% block title %}NetSanctum — {{ _('auth', 'access_terminal') }}{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-sm">

        <!-- Access Card -->
        <div class="border border-zinc-800 rounded-none bg-zinc-950/40 p-6 space-y-6">

            <!-- Terminal Header -->
            <div class="space-y-1 pb-4 border-b border-zinc-900">
                <h2 class="text-base font-black uppercase tracking-wider text-white font-mono">
                    {{ _('auth', 'access_terminal') }}
                </h2>
                <p class="text-[10px] text-zinc-500 font-mono uppercase tracking-wide">
                    {{ _('auth', 'secured_node') }}
                </p>
            </div>

            <!-- Token Entry Form -->
            <form hx-post="/auth/ui/login"
                  hx-target="#auth-feedback"
                  hx-swap="innerHTML"
                  class="space-y-5">

                <div class="space-y-1.5">
                    <div class="flex items-center justify-between">
                        <label class="block text-[10px] font-mono font-bold uppercase tracking-wider text-zinc-500">
                            {{ _('auth', 'token_label') }}
                        </label>
                    </div>
                    
                    <div class="relative">
                        <input type="password"
                               id="access-token-input"
                               name="token"
                               required
                               placeholder="{{ _('auth', 'token_placeholder') }}"
                               class="w-full bg-black border border-zinc-800 rounded-none px-3.5 py-3 pr-12 text-xs font-mono text-zinc-100 placeholder-zinc-850 focus:border-teal-400 focus:outline-none transition-colors">
                        
                        <!-- Toggle view button -->
                        <button type="button"
                                onclick="toggleTokenVisibility()"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-white transition-colors font-mono text-[10px] select-none cursor-pointer">
                            [SHOW]
                        </button>
                    </div>
                    <p class="text-[9px] font-mono text-zinc-600 leading-normal">
                        {{ _('auth', 'token_hint') }}
                    </p>
                </div>

                <button type="submit"
                        class="w-full bg-teal-400 text-black font-mono font-bold text-xs uppercase tracking-wider py-3 px-4 rounded-none border border-teal-400 hover:bg-black hover:text-teal-400 transition-all cursor-pointer">
                    {{ _('auth', 'authenticate') }}
                </button>
            </form>

            <!-- HTMX Feedback banner injected here -->
            <div id="auth-feedback" class="mt-4"></div>

        </div>
    </div>
</div>

<script>
    function toggleTokenVisibility() {
        const input = document.getElementById('access-token-input');
        const btn = event.currentTarget;
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '[HIDE]';
        } else {
            input.type = 'password';
            btn.textContent = '[SHOW]';
        }
    }
</script>
{% endblock %}
