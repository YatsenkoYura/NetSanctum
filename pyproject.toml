[tool.ruff]
# Target Python version
target-version = "py312"
line-length = 110

[tool.ruff.lint]
# Rules: Pyflakes (F), Pycodestyle (E, W), Isort (I), Pep8-naming (N), 
# Pyupgrade (UP), Bugbear (B), Comprehensions (C4), Ruff-specific (RUF)
select = [
    "F",    # Pyflakes
    "E",    # Pycodestyle errors
    "W",    # Pycodestyle warnings
    "I",    # Isort (imports sorting)
    "N",    # Pep8 naming conventions
    "UP",   # Pyupgrade (suggest modern syntax)
    "B",    # Bugbear (detect common design bugs)
    "C4",   # Comprehensions
    "RUF"   # Ruff custom rules
]

ignore = [
    "E501",  # Line length handled by formatter
    "B008",  # Do not perform function calls in argument defaults (FastAPI Depends uses this)
    "RUF001", # Cyrillic letter warnings (false positives in i18n files)
    "RUF002", # Cyrillic letter warnings (false positives in i18n files)
    "RUF003", # Cyrillic letter warnings (false positives in i18n files)
    "E402",   # Module level import not at top of file
    "B904"    # Within an except clause, raise exceptions with raise ... from err
]

[tool.ruff.lint.isort]
known-first-party = ["app"]
combine-as-imports = true
